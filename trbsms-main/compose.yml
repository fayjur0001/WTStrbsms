services:
  drk_sms_web_dev:
    user: ${RUNING_USER}
    restart: always
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: drk-sms-web-dev
    container_name: drk-sms-web-dev
    ports:
      - "8080:3000"
    volumes:
      - node_modules:/app/node_modules
      - nextjs_cache:/app/.next
      - ./src/db:/app/src/db
      - ./:/app:ro
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@drk_sms_db_dev:5432/db
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_NAME_SALT: ${TOKEN_NAME_SALT}
      PUSHER_SECRET: ${PUSHER_SECRET}
    depends_on:
      - drk_sms_db_dev
      - drk_sms_change_ownership
  drk_sms_change_ownership:
    user: root
    container_name: drk-sms-change-ownership
    image: node:22-alpine
    volumes:
      - node_modules:/app/node_modules
      - nextjs_cache:/app/.next
    command: chmod -R 777 /app/node_modules /app/.next

  drk_sms_db_dev:
    restart: always
    image: postgres:17.4-alpine3.21
    container_name: drk-sms-db
    user: ${RUNING_USER}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: db
    volumes:
      - ./storage/db-data:/var/lib/postgresql/data

volumes:
  node_modules:
    name: drk_sms_node_modules
  nextjs_cache:
    name: drk_sms_nextjs_cache
