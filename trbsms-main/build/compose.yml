services:
  drk_sms_web_prod:
    user: ${RUNING_USER}
    restart: always
    build:
      context: ..
      dockerfile: Dockerfile.prod
    image: drk-sms-web-prod
    container_name: drk-sms-web-prod
    ports:
      - "8080:3000"
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@drk_sms_db_prod:5432/db
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_NAME_SALT: ${TOKEN_NAME_SALT}
      PUSHER_SECRET: ${PUSHER_SECRET}
    depends_on:
      - drk_sms_db_prod
  drk_sms_db_prod:
    restart: always
    image: postgres:17.4-alpine3.21
    container_name: drk-sms-db-prod
    user: ${RUNING_USER}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: db
    volumes:
      - ./storage/db-data:/var/lib/postgresql/data
